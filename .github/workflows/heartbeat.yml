name: 🛰️ Dolakha Heartbeat Pulsar
on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: 📡 Dispatching Pulse to Production
        run: |
          curl -X GET "https://dolakhafurniture.vercel.app/api/social/cron/heartbeat" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

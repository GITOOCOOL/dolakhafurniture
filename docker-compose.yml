services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: dolakha-web
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./web/.env.local
    environment:
      - NODE_ENV=development
    command: npm run dev -- --hostname 0.0.0.0

  sanity-studio:
    build:
      context: ./sanity-studio
      dockerfile: Dockerfile.dev
    container_name: dolakha-studio
    ports:
      - "3333:3333"
    volumes:
      - ./sanity-studio:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
